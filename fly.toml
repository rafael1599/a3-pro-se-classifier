# fly.toml app configuration file generated for a3-pro-se-classifier on 2026-06-06T23:23:31-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'a3-pro-se-classifier'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DAILY_QUOTA = '120'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '2m0s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
